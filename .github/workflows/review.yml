name: Review submissions

# The tiger-vendor-bot. On every submission PR it runs the deterministic gate (review.php)
# then, when a model token is configured, the AI quality+safety pass (review-ai.php), and
# posts the combined findings as a sticky PR comment. A maintainer makes the final merge call.
on:
  pull_request:
    paths:
      - 'data/*.json'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Review changed listings
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # lifts GitHub API rate limits
          MODEL_TOKEN: ${{ secrets.MODEL_TOKEN }}      # GitHub Models PAT (models:read) or an LLM key; unset = AI pass skipped
          # MODEL_ENDPOINT / MODEL_NAME can be set as repo variables to swap providers.
        run: |
          {
            echo "## 🐯 tiger-vendor-bot"
            echo
            files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'data/*.json' | grep -v 'index.json' || true)
            [ -z "$files" ] && echo "_No listing files changed._"
            for f in $files; do
              echo "### \`$f\`"
              echo '```'
              php scripts/review.php "$f" 2>&1 || echo "→ deterministic gate: CHANGES REQUESTED"
              echo '```'
              if [ -n "$MODEL_TOKEN" ]; then
                php scripts/review-ai.php "$f" 2>/dev/null || true
              else
                echo "_AI pass skipped — set the \`MODEL_TOKEN\` secret to enable it._"
              fi
              echo
            done
            echo "---"
            echo "_Automated triage. A maintainer reviews before merge._"
          } > report.md
          cat report.md

      - name: Post findings comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Sticky comment: update the bot's existing comment if present, else create one.
          id=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.number }}/comments" \
                 --jq '[.[] | select(.body | startswith("## 🐯 tiger-vendor-bot"))][0].id // empty')
          if [ -n "$id" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$id" -F body=@report.md >/dev/null
          else
            gh pr comment ${{ github.event.number }} --body-file report.md
          fi
